<!doctype html>
<html><!-- joystick test -->
<head>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
<script src="https://unpkg.com/aframe-dust-component@^1.1.0/aframe-dust-component.js"></script>
<script>
let jc = 0;  // temp debug
let p = 0;
let rc = 0;

let gmode = 0;	// 0=surface, 1=asteroid...
const MAXMODE = 1;

// joystick handle ref position in vrpos frame
let jsref = new THREE.Vector3(0, 1.0, -0.5);

// force value into range ref-delta, ref+delta
function clamp(val, ref, delta) {
	if (val < ref - delta) {
		return ref - delta;
	} else if (val > ref + delta) {
		return ref + delta;
	}
	return val;
}

// update joystick from hand motion
AFRAME.registerComponent('joyctl', {
	init: function () {
		jc = this;
		this.active = false;
		this.tvec = new THREE.Vector3();
		this.controllerData = this.el.components["controller-listener"];
		this.el.setAttribute('visible', false);
	},
	
	update: function () {
		this.lcon = document.querySelector("#LHand");
		this.rcon = document.querySelector("#RHand");
		this.stick = document.querySelector("#joystick");
		
		this.rcon.addEventListener('gripdown', (event) => {
			console.log('Grip down', this.rcon.object3D.position);
			const grabDist2 = 0.1; // 0.02;
			if (this.rcon.object3D.position.distanceToSquared(jsref) < grabDist2) {
				this.active = true;
			}
		});
		rc = this.rcon;
		this.rcon.addEventListener('gripup', (event) => {
			console.log('Grip up');
			this.active = false;
		});
	},

	tick: function (time, delta) {
		let crot = this.stick.object3D.rotation;
		if (this.active) {
			// force into valid range
			let cpos = this.rcon.object3D.position
			cpos.x = clamp(cpos.x, jsref.x, 0.25);
			cpos.z = clamp(cpos.z, jsref.z, 0.25);
			cpos.y = clamp(cpos.y, jsref.y, 0.05);

			// hand pos rel to stick center
			this.tvec.subVectors(cpos, jsref);
			crot.z = -Math.asin(this.tvec.x)*2;	// / height
			crot.x = Math.asin(this.tvec.z)*2;
		} else {
			// inactive, auto return to center
			if (crot.x > 0.005) {
				crot.x -= 0.005;
			} else if (crot.x < -0.005) {
				crot.x += 0.005;
			}
			if (crot.z > 0.005) {
				crot.z -= 0.005;
			} else if (crot.z < -0.005) {
				crot.z += 0.005;
			}
		}
	}
});

// update ship motion
AFRAME.registerComponent('pilot', {
	schema: {
		rotrate: { default: 0.002 },	// rotation rate deg/msec per joy deg
		speed: { default: 0.02 },		// linear speed, m/msec (100mph=.045m/ms)
		//speed: { default: 0.0 },		// linear speed, m/msec
	},
	
	init: function () {
		p = this;
		this.vel = new THREE.Vector3(0, 0, -this.data.speed);	// linear velocity, ship frame
		this.wrot = this.el.object3D.quaternion;	// world orientation
		this.axis = new THREE.Vector3();
		this.q1 = new THREE.Quaternion();
		//this.q2 = new THREE.Quaternion();
		
		// connect dust to camera
		let scene = this.el.sceneEl;
		scene.querySelector('a-dust').components.dust.setCamera(scene.querySelector('[camera]'));
	},
	
	update: function () {
		this.stick = document.querySelector("#joystick");
		let meP = document.querySelector("#meP");
		this.wpos = meP.object3D.position;		// world position
	},
	
	tick: function (time, delta) {
		//if (!this.el.sceneEl.is("vr-mode")) return;

		// rotate wrot and wvel from joystick
		let q = this.stick.object3D.quaternion;
		let angle = 2 * Math.acos(q.w);
		if (Math.abs(angle) < 0.0001) {
			this.axis.set(0, 1, 0);
		} else {
			const s = Math.sqrt(1 - q.w * q.w);
			this.axis.set(q.x/s, q.y/s, q.z/s);
		}
		angle *= delta * this.data.rotrate;
		// rotate ship
		this.q1.setFromAxisAngle(this.axis, angle);
		this.wrot.multiply(this.q1);
		
		// velocity in world frame
		// maybe blend with prev vel for inertia?
		this.axis.copy(this.vel);
		this.axis.applyQuaternion(this.wrot);
		// move along velocity
		this.wpos.addScaledVector(this.axis, delta);
	}
});

// calibrate user position
AFRAME.registerComponent('thumb-events',{
	init: function () {
		this.el.addEventListener('thumbstickmoved', (event) => {
			this.getStick(event);
		});
	},
	update: function () {
		this.pos = document.querySelector("#vrpos");
		this.dpos = 0.01
	},
	getStick: function (evt) {
		pos = this.pos.object3D.position;
		if (evt.srcElement.id == "LHand") {	// adjust VR offset
			if (evt.detail.y > 0.5) { 
				pos.y -= this.dpos; jsref.y += this.dpos; 
			} else if (evt.detail.y < -0.5) { 
				pos.y += this.dpos; jsref.y -= this.dpos;
			}
			if (evt.detail.x < -0.5) { 
				pos.z += this.dpos; jsref.z -= this.dpos; 
			} else if (evt.detail.x > 0.5) { 
				pos.z -= this.dpos; jsref.z += this.dpos;
			}
		} else {	// right hand = menu update
			if (evt.detail.y > 0.95) {
				guiSet(-1);
			} else if (evt.detail.y < -0.95) {
				guiSet(1);
			}
		}
	}
});

// create ship track, other button stuff
AFRAME.registerComponent('set-track',{
	init: function () {
		this.active = false;
		this.el.addEventListener('abuttondown', (event) => {
			if (this.active) {
				this.active = false;
			} else {
				this.start();
			}
		});
		this.el.addEventListener('bbuttondown', (event) => {
			guiMode();
		});
	},
	update: function () {
		this.pos = document.querySelector("#meP");
		this.rot = document.querySelector("#meR");
		this.track = document.querySelector("#track");
		this.dt = 2000.0;	// msec between points
	},
	start: function() {
		this.active = true;
		this.ttime = this.el.sceneEl.time;
		this.track.replaceChildren();	// remove old path
	},
	tick: function (time, delta) {
		if (this.active && time >= this.ttime) {
			this.ttime += this.dt;
			// add cube at current ship pos
			// FIXME save ship orient
			const cube = document.createElement('a-box');
			const pos = this.pos.object3D.position;
			cube.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
			cube.setAttribute('depth', 0.5);
			cube.setAttribute('height', 0.5);
			cube.setAttribute('width', 0.5);
			cube.setAttribute('color', '#FFF');
			
			this.track.appendChild(cube);
		}
	}
	// add function to dump track
});

// cycle GUI mode on RH "B" button
var Gfunc = 0;
function guiMode() {
	if (++Gfunc > 3)
		Gfunc = 0;
	guiSet(0);
}

// 0=show current setting, 1=increment, -1=decrement
function guiSet(d) {
	var name;
	var val;
	switch (Gfunc) {
	case 0:		// scene mode, 0-1
		name = "Scene mode";
		if (d == 1) {
			if (++gmode > MAXMODE) gmode = 0;
		} else if (d == -1) {
			if (--gmode < 0) gmode = MAXMODE;
		}
		switch(gmode) {
		case 0: val = "Lava sfc"; break;
		case 1: val = "Asteroids"; break;
		}

		// update what's visible
		let x = document.querySelector("#surface");
		x.setAttribute('visible', gmode==0);
		x = document.querySelector("#asteroids");
		x.setAttribute('visible', gmode==1);
		break;
	
	case 1:		// ship speed
		name = "Speed";
		let vel = document.querySelector("#meR").components['pilot'].vel;
		val = vel.z = Math.min(0, vel.z - 0.001 * d);
		break;
	
	case 2:		// track point msec
		name = "Track dist msec";
		let st = document.querySelector("#RHand").components['set-track']
		val = st.dt = Math.max(100, st.dt + 10*d);
		break;
		
	}
//	  pitch blend. meteor rate
			
	let label = document.querySelector("#gui");
	label.setAttribute('text', 'value: ' + name + ' ' + String(val));
}

</script>
</head>
<body>	

<a-scene renderer="colorManagement: true; antialias: true">

	<a-assets>
	<!-- https://www.spacespheremaps.com/ -->
	<img id="sky" crossorigin="anonymous" src=
	   "https://digamesvr.github.io/demo1/images/multi_nebulae_3.jpg"
	>
	<a-asset-item id="boxer"
        src="https://digamesvr.github.io/demo1/models/boxer.glb"
	></a-asset-item>
	<a-asset-item id="asteroid2"
        src="https://digamesvr.github.io/demo1/models/asteroid2.glb"
	></a-asset-item>
	<a-asset-item id="asteroid3"
        src="https://digamesvr.github.io/demo1/models/asteroid3.glb"
	></a-asset-item>
	
	<audio id="music1" preload="auto" crossorigin="anonymous"
         src="https://digamesvr.github.io/demo1/sound/Friends.mp3"
	></audio>
	</a-assets>

	<a-entity id="surface" scale="4 4 4"
		environment="preset: volcano; skyType: none; fog: 0" 
	></a-entity>

	<!-- world frame -->
	
	<!-- world lighting, can move sun for time-of-day sim -->
	<a-entity light="type: ambient; color: #444"></a-entity>
	<a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-.5 1 1"></a-entity>	
	
	<!-- motion reference track -->
	<a-entity id="track"></a-entity>
	
	<a-entity id="asteroids" visible="false">
		<a-entity position="0 20 -200" rotation="40 50 10">
		<a-entity id="ast1" gltf-model="#asteroid2" scale="10 10 10" 
		animation="property:rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 30000;
                         easing:linear"
		></a-entity></a-entity>
		<a-entity position="50 20 -300" rotation="-5 40 -60">
		<a-entity id="ast2" gltf-model="#asteroid3" scale="10 10 10"
		animation="property:rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 25000;
                         easing:linear"
		></a-entity></a-entity>
	</a-entity>	

	<!-- occasional meteorite? add random time, speed, color, positions -->
	<a-box color="yellow" width="15" depth="0.5" height="0.5"
		emissive="#FCC" animation="property: position; 
		from: -2200 60 -100; to: 2200 25 -150; dur: 2000; easing: linear; loop: true">
	></a-box>
	
	<a-dust num-points="200" color="#303030" point-size="1.2"></a-dust>	

	<!-- ship position -->
	<a-entity id="meP" position="0 20 -100">

		<!-- space background moves with ship -->
		<a-sky src="#sky" material="depthWrite: false; 
			blending: none; dithering: false; fog: false"></a-sky>

		<!-- ship orientation -->
		<a-entity id="meR" pilot>
			<!-- ship frame - lighting, cockpit; ref = floor under pilot -->
	
			<a-entity id="ship" gltf-model="#boxer" scale="0.75 0.75 0.75"
				rotation="0 -90 0" position="0.783 1.424 1.802"
			></a-entity>

<!--
			<a=sound id="music" src="#music1" volume="0.75" 
				autoplay="true" loop="true" positional="false"
			></a-sound>
-->
		
			<a-text id="gui" text="value: GUI HERE" 
				position=".05 0.6 -0.8" scale="1 2 1" width="2"></a-text>
				
			<a-entity id="joystick" position="0 0 -0.5">
				<a-cylinder height="0.5" radius="0.02" position="0 0.25 0"
					material="color: #899dcd; metalness: 0.7" 
					geometry="segmentsHeight: 1; segmentsRadial: 8">
				</a-cylinder>
				<a-cylinder height="0.14" radius="0.03" position="0 0.56 0"
					material="color: #202020; metalness: 0.1" 
					geometry="segmentsHeight: 1; segmentsRadial: 16">
				</a-cylinder>
				<a-entity id="jc" joyctl></a-entity>
			</a-entity>
	
			<!-- VR headset/controllers with adjustable offset -->
			<a-entity id="vrpos" position="0 -0.5 0">
			<a-camera> </a-camera>
			<a-entity id="LHand" hand-controls="hand: left; 
				color: #696145; handModelStyle: highPoly; autoHide=false"
				thumb-events></a-entity>
			<a-entity id="RHand" hand-controls="hand: right;
				color: #696145; handModelStyle: highPoly; autoHide=false"
				thumb-events set-track></a-entity>
			</a-entity>
		</a-entity>
	</a-entity>
	
</a-scene>

</body></html>
