<script type="module">
import 'aframe';
import 'dust';
import 'environment';
import 'wormhole';
import 'particle';
	
window.jc = 0;  // temp debug
window.p = 0;
window.rc = 0;

let gmode = 0;	// 0=surface, 1=asteroid, 2=saturn, 3=wormhole, 4=hyperspace

// joystick handle ref position in vrpos frame
let jsref = new THREE.Vector3(0, 1.0, -0.5);

// force value into range ref-delta, ref+delta
function clamp(val, ref, delta) {
	if (val < ref - delta) {
		return ref - delta;
	} else if (val > ref + delta) {
		return ref + delta;
	}
	return val;
}

// update joystick from hand motion
AFRAME.registerComponent('joyctl', {
	init: function () {
		window.jc = this;
		this.active = false;
		this.tvec = new THREE.Vector3();
		this.controllerData = this.el.components["controller-listener"];
		this.el.setAttribute('visible', false);
	},
	
	update: function () {
		this.lcon = document.querySelector("#LHand");
		this.rcon = document.querySelector("#RHand");
		this.stick = document.querySelector("#joystick");
		
		this.rcon.addEventListener('gripdown', (event) => {
			console.log('Grip down', this.rcon.object3D.position);
			const grabDist2 = 0.1; // 0.02;
			if (this.rcon.object3D.position.distanceToSquared(jsref) < grabDist2) {
				this.active = true;
			}
		});
		window.rc = this.rcon;
		this.rcon.addEventListener('gripup', (event) => {
			console.log('Grip up');
			this.active = false;
		});
	},

	tick: function (time, delta) {
		let crot = this.stick.object3D.rotation;
		if (this.active) {
			// force into valid range
			let cpos = this.rcon.object3D.position
			cpos.x = clamp(cpos.x, jsref.x, 0.25);
			cpos.z = clamp(cpos.z, jsref.z, 0.25);
			cpos.y = clamp(cpos.y, jsref.y, 0.05);

			// hand pos rel to stick center
			this.tvec.subVectors(cpos, jsref);
			crot.z = -Math.asin(this.tvec.x)*2;	// / height
			crot.x = Math.asin(this.tvec.z)*2;
		} else {
			// inactive, auto return to center
			if (crot.x > 0.005) {
				crot.x -= 0.005;
			} else if (crot.x < -0.005) {
				crot.x += 0.005;
			}
			if (crot.z > 0.005) {
				crot.z -= 0.005;
			} else if (crot.z < -0.005) {
				crot.z += 0.005;
			}
		}
	}
});

// update ship motion
AFRAME.registerComponent('pilot', {
	schema: {
		rotrate: { default: 0.01 },	// rotation rate deg/msec per joy deg
		speed: { default: 0.02 },		// linear speed, m/msec (100mph=.045m/ms)
	},
	
	init: function () {
		window.p = this;
		this.vel = new THREE.Vector3(0, 0, -this.data.speed);	// linear velocity, ship frame
		this.wrot = this.el.object3D.quaternion;	// world orientation
		this.axis = new THREE.Vector3();
		this.q1 = new THREE.Quaternion();
		//this.q2 = new THREE.Quaternion();
		
		// connect dust to camera
		let scene = this.el.sceneEl;
		scene.querySelector('a-dust').components.dust.setCamera(scene.querySelector('[camera]'));
	},
	
	update: function () {
		this.stick = document.querySelector("#joystick");
		let meP = document.querySelector("#meP");
		this.wpos = meP.object3D.position;		// world position
	},
	
	tick: function (time, delta) {
		//if (!this.el.sceneEl.is("vr-mode")) return;

		// rotate wrot and wvel from joystick
		let q = this.stick.object3D.quaternion;
		let angle = 2 * Math.acos(q.w);
		if (Math.abs(angle) < 0.0001) {
			this.axis.set(0, 1, 0);
		} else {
			const s = Math.sqrt(1 - q.w * q.w);
			this.axis.set(q.x/s, q.y/s, q.z/s);
		}
		angle *= delta * this.data.rotrate;
		// rotate ship
		this.q1.setFromAxisAngle(this.axis, angle);
		this.wrot.multiply(this.q1);
		
		// velocity in world frame
		// maybe blend with prev vel for inertia?
		this.axis.copy(this.vel);
		this.axis.applyQuaternion(this.wrot);
		// move along velocity
		this.wpos.addScaledVector(this.axis, delta);
	}
});

// setup/start music beat flight track (X button)
// for now straight line in current direction
// no good for wormhole mode!
let beat_offset = 10;	// m

function beatTrack() {
	let m = document.querySelector("#music").components.sound;
	m.stopSound();
	
	let track = document.querySelector("#track");
	track.replaceChildren();	// remove old path
	const pos = document.querySelector("#meP").object3D.position;
	const posz = pos.z + beat_offset;
	let vel = document.querySelector("#meR").components['pilot'].vel.z;
	
	for (let i = 0; i < beatsamp.length; i++) {
		// fixme save as msec not samples
		let msec = beatsamp[i]*1000/22050
			
		const cube = document.createElement('a-box');
		cube.setAttribute('position', `${pos.x} ${pos.y} ${pos.z + msec*vel}`);
		cube.setAttribute('depth', 0.5);
		cube.setAttribute('height', 0.3);
		cube.setAttribute('width', 5.0);

		// not a good selector...
		if (beattype[i] < 30) {
			cube.setAttribute('color', '#F00');
		} else {
			cube.setAttribute('color', '#00F');
		}
		track.appendChild(cube);
	}

	m.playSound();
}

// calibrate user position, etc.
AFRAME.registerComponent('thumb-events',{
	init: function () {
		this.el.addEventListener('thumbstickmoved', (event) => {
			this.getStick(event);
		});
		this.el.addEventListener('xbuttondown', (event) => {
			beatTrack();
		});

	},
	update: function () {
		this.pos = document.querySelector("#vrpos");
		this.dpos = 0.01
	},
	getStick: function (evt) {
		let pos = this.pos.object3D.position;
		if (evt.srcElement.id == "LHand") {	// adjust VR offset
			if (evt.detail.y > 0.5) { 
				pos.y -= this.dpos; jsref.y += this.dpos; 
			} else if (evt.detail.y < -0.5) { 
				pos.y += this.dpos; jsref.y -= this.dpos;
			}
			if (evt.detail.x < -0.5) { 
				pos.z += this.dpos; jsref.z -= this.dpos; 
			} else if (evt.detail.x > 0.5) { 
				pos.z -= this.dpos; jsref.z += this.dpos;
			}
		} else {	// right hand = menu update
			if (evt.detail.y > 0.95) {
				guiSet(-1);
			} else if (evt.detail.y < -0.95) {
				guiSet(1);
			}
		}
	}
});

// create ship track, other button stuff
AFRAME.registerComponent('set-track',{
	init: function () {
		this.active = false;
		this.el.addEventListener('abuttondown', (event) => {
			let m = document.querySelector("#music").components.sound;
			m.stopSound();
			if (this.active) {
				this.active = false;
			} else {
				this.start();
			}
		});
		this.el.addEventListener('bbuttondown', (event) => {
			guiMode();
		});
	},
	update: function () {
		this.pos = document.querySelector("#meP");
		this.rot = document.querySelector("#meR");
		this.track = document.querySelector("#track");
		this.dt = 2000.0;	// msec between points
	},
	start: function() {
		this.active = true;
		this.ttime = this.el.sceneEl.time;
		this.track.replaceChildren();	// remove old path
	},
	tick: function (time, delta) {
		if (this.active && time >= this.ttime) {
			this.ttime += this.dt;
			// add cube at current ship pos
			const cube = document.createElement('a-box');
			const pos = this.pos.object3D.position;
			cube.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
			//const rot = this.rot.object3D.rotation;
			//cube.setAttribute('rotation', `${rot.x}*r2d ${rot.y}*r2d ${rot.z}*r2d`);
			cube.object3D.quaternion.copy(this.rot.object3D.quaternion);
			cube.setAttribute('depth', 1.0);
			cube.setAttribute('height', 1.0);
			cube.setAttribute('width', 5.0);
			cube.setAttribute('color', '#FFF');
			
			this.track.appendChild(cube);
		}
	}
	// add function to dump track
});

// cycle GUI mode on RH "B" button
var Gfunc = 0;
function guiMode() {
	if (++Gfunc > 4)
		Gfunc = 0;
	guiSet(0);
}

// 0=show current setting, 1=increment, -1=decrement
function guiSet(d) {
	var name;
	var val;
	let vel = document.querySelector("#meR").components['pilot'].vel;

	switch (Gfunc) {
	case 0:		// scene mode, 0-1
		name = "Scene mode";
		if (d == 1) {
			if (++gmode > 4) gmode = 0;
		} else if (d == -1) {
			if (--gmode < 0) gmode = 4;
		}
		switch(gmode) {
		case 0: val = "Lava sfc"; break;
		case 1: val = "Asteroids"; break;
		case 2: val = "Saturn"; break;
		case 3: val = "Wormhole"; break;
		case 4: val = "Hyperspace"; break;
		}

		// update what's visible
		let x = document.querySelector("#surface");
		x.setAttribute('visible', gmode==0);
		x = document.querySelector("#asteroids");
		x.setAttribute('visible', gmode==1);
		if (gmode==1 && x.getChildren().length < 2) {
			asteroidField(x);
		}
		x = document.querySelector("#satrings");
		x.setAttribute('visible', gmode==2);
		x = document.querySelector("#wormhole");
		x.setAttribute('wormhole', 'visible', gmode==3);
		x = document.querySelector("#hyperspace");
		x.setAttribute('visible', gmode==4);
		x = document.querySelector("#bgnd");
		x.setAttribute('color', gmode==4 ? '#000' : '#FFF');

        if (gmode==3) {
			//vel.z = 0;
        } else {
			// FIXME optimize wormhole tick etc. if not visible?
			if (vel.z == 0)
				vel.z = -0.02;
		}
		let meP = document.querySelector("#meP");
		meP.object3D.position.set(0, 20, 0);	// reset position
		break;
	
	case 1:		// ship speed
		name = "Speed";
		val = vel.z = Math.min(0, vel.z - 0.001 * d);
		break;
	
	case 2:		// track point msec
		name = "Track dist msec";
		let st = document.querySelector("#RHand").components['set-track']
		val = st.dt = Math.max(100, st.dt + 10*d);
		break;

	case 3:	// rotation rate
		name = "Roll Rate";
		
		let pd = document.querySelector("#meR").components['pilot'].data;
		val = pd.rotrate = Math.max(0.001, pd.rotrate + 0.0005 * d);
		break;
		
	case 4: // beat line start offset
		name = "Beat offset";
		val = beat_offset = beat_offset + d;
		break;		
	}
//	  pitch blend. meteor rate
			
	let label = document.querySelector("#gui");
	label.setAttribute('text', 'value: ' + name + ' ' + String(val));
}

// for console use
window.guiSet = guiSet;
</script>

<script>
function rgbToHex(r, g, b) {
  const toHex = (c) => Math.floor(c).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
};

function add_asteroid(ix, iy, iz) {
	// parent with rotation axis
	let p = document.createElement('a-entity');
	// scale and jiggle position
	p.object3D.position.x = ix * 40 + Math.random()*2;
	p.object3D.position.y = iy * 40 + Math.random()*2;
	p.object3D.position.z = iz * 40 + Math.random()*2;
	// axis orient
	p.setAttribute("rotation", `${180*Math.random()} ${180*Math.random()} ${180*Math.random()}`);
	
	// sphere
	let s = document.createElement("a-sphere");
	p.appendChild(s);
	s.object3D.scale.x = 4 + 5*Math.random();
	s.object3D.scale.y = 4 + 5*Math.random();
	s.object3D.scale.z = 4 + 5*Math.random();
	s.setAttribute("segments-height", 16);
	s.setAttribute("segments-width", 16);

	let red = 0x80 + 0x70*Math.random();
	s.setAttribute("material", "color", rgbToHex(red, 
			red - 0x10 + 0x20*Math.random(),
			red - 0x10 + 0x20*Math.random()));
	s.setAttribute("material", 
		`metalness: ${0.1 + 0.8*Math.random()}; roughness: ${0.6 + 0.39*Math.random()};`);
	let scale = -0.1 - 2*Math.random();
	let rep = 1.5 + 4*Math.random();
	s.setAttribute("material", `normalMap: #astnorm; normalScale: ${scale} ${scale}; normalTextureRepeat: ${rep} ${rep}`);
	scale = 0.3 + 2.4*Math.random();
	rep = Math.floor(3+4*Math.random());
	//rep = 3+4*Math.random();
	s.setAttribute("material", `displacementMap: #astdisp; displacementScale: ${scale} ${scale}; displacementTextureRepeat: ${rep} ${rep}`);

	if (Math.random() < 0.2) {		// add spin
		let rx = ry = rz = 0;
		if (Math.random() < 0.3) rx = Math.random() < 0.5 ? -360 : 360;
		if (Math.random() < 0.3) ry = Math.random() < 0.5 ? -360 : 360;
		if (Math.random() < 0.3) rz = Math.random() < 0.5 ? -360 : 360;
		s.setAttribute("animation", `property: rotation; to: ${rx} ${ry} ${rz}; easing: linear; dur: ${40000+100000*Math.random()}`);
	}

	return p;
}

// create asteroid field
function asteroidField(el) {
	var ix, iy, iz;
	for (ix=-5; ix<=5; ix++) {
		for (iy=-5; iy<=5; iy++) {
			for (iz=-5; iz<=5; iz++) {
				// maybe drop this position, more likely farther from center
				if (Math.random() < (ix+iy+iz)/30) {
					el.appendChild(add_asteroid(ix, iy, iz));
				}
			}
		}
	}
}
