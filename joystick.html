<!doctype html>
<html><!-- joystick test -->
<head>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
<script>
let jc = 0;  // temp debug
let p = 0;

// joystick handle ref position in vrpos frame
let jsref = new THREE.Vector3(0, 1.0, -0.5);

// force value into range ref-delta, ref+delta
function clamp(val, ref, delta) {
	if (val < ref - delta) {
		return ref - delta;
	} else if (val > ref + delta) {
		return ref + delta;
	}
	return val;
}

// update joystick from hand motion
AFRAME.registerComponent('joyctl', {
	init: function () {
		jc = this;
		this.active = false;
		this.tvec = new THREE.Vector3();
		this.controllerData = this.el.components["controller-listener"];
		this.el.setAttribute('visible', false);
	},
	
	update: function () {
		this.lcon = document.querySelector("#LHand");
		this.rcon = document.querySelector("#RHand");
		this.stick = document.querySelector("#joystick");
		
		this.rcon.addEventListener('gripdown', (event) => {
			console.log('Grip down', this.rcon.object3D.position);
			const grabDist2 = 0.1; // 0.02;
			if (this.rcon.object3D.position.distanceToSquared(jsref) < grabDist2) {
				this.active = true;
			}
		});
		this.rcon.addEventListener('gripup', (event) => {
			console.log('Grip up');
			this.active = false;
		});
	},

	tick: function (time, delta) {
		let crot = this.stick.object3D.rotation;
		if (this.active) {
			// force into valid range
			let cpos = this.rcon.object3D.position
			cpos.x = clamp(cpos.x, jsref.x, 0.25);
			cpos.z = clamp(cpos.z, jsref.z, 0.25);
			cpos.y = clamp(cpos.y, jsref.y, 0.05);

			// hand pos rel to stick center
			this.tvec.subVectors(cpos, jsref);
			crot.z = -Math.asin(this.tvec.x)*2.0;	// / height
			crot.x = Math.asin(this.tvec.z)*2.0;
		} else {
			// inactive, auto return to center
			if (crot.x > 0.005) {
				crot.x -= 0.005;
			} else if (crot.x < -0.005) {
				crot.x += 0.005;
			}
			if (crot.z > 0.005) {
				crot.z -= 0.005;
			} else if (crot.z < -0.005) {
				crot.z += 0.005;
			}
		}
	}
});

// update ship motion
AFRAME.registerComponent('pilot', {
	schema: {
		rotrate: { default: 0.002 },	// rotation rate deg/msec per joy deg
		speed: { default: 0.002 },		// linear speed, m/msec
	},
	
	init: function () {
		p = this;
		this.wvel = new THREE.Vector3(0, 0, -this.data.speed);	// linear velocity, world frame
		this.wpos = this.el.object3D.position;		// world position
		this.wrot = this.el.object3D.quaternion;	// world orientation
	},
	
	update: function () {
		this.stick = document.querySelector("#joystick");
	},
	
	tick: function (time, delta) {
		//if (!this.el.sceneEl.is("vr-mode")) return;
		
		// FIXME no news in here

		// rotate wrot and wvel from joystick
		q = this.stick.object3D.quaternion;
		let angle = 2 * Math.acos(q.w);
		if (Math.abs(angle) < 0.0001) {
			x = 0; y = 1; z = 0;
		} else {
			const s = Math.sqrt(1 - q.w * q.w);
			x = q.x / s;
			y = q.y / s;
			z = q.z / 2;
		}
		axis = new THREE.Vector3(x, y, z);
		angle *= delta * this.data.rotrate;
		// rotate ship in ship frame
		q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
		this.wrot.multiply(q);
		// rotate velocity in world frame
		// THIS is for object3d! this.wvel.rotateOnWorldAxis(axis, angle);
		wq = new THREE.Quaternion();
		this.el.object3D.getWorldQuaternion(wq);
		wq.multiply(q);
		this.wvel.applyQuaternion(wq);
		
		// move along velocity
		///FIXME this.wpos.addScaledVector(this.wvel, delta);
	}
});

// calibrate user position
AFRAME.registerComponent('thumb-events',{
	init: function () {
		this.el.addEventListener('thumbstickmoved', (event) => {
			this.getStick(event);
		});
	},
	update: function () {
		this.pos = document.querySelector("#vrpos");
		this.dpos = 0.01
	},
	getStick: function (evt) {
		pos = this.pos.object3D.position;
		if (evt.srcElement.id == "LHand") {	// adjust VR offset
			if (evt.detail.y > 0.5) { 
				pos.y -= this.dpos; jsref.y += this.dpos; 
			} else if (evt.detail.y < -0.5) { 
				pos.y += this.dpos; jsref.y -= this.dpos;
			}
			if (evt.detail.x < -0.5) { 
				pos.z += this.dpos; jsref.z -= this.dpos; 
			} else if (evt.detail.x > 0.5) { 
				pos.z -= this.dpos; jsref.z += this.dpos;
			}
		}
	}
});

</script>
</head>
<body>	

<a-scene renderer="colorManagement: true; antialias: true">

	<a-assets>
	<!-- https://www.spacespheremaps.com/ -->
	<img id="sky" crossorigin="anonymous" src=
	   "https://digamesvr.github.io/demo1/images/multi_nebulae_3.jpg"
	>
	</a-assets>
	  

	<a-entity id="env" environment="preset: volcano; skyType: none; fog: 0" scale="4 4 4">
	</a-entity>

	<!-- world frame -->
	
	<!-- world lighting, can move sun for time-of-day sim -->
	<a-entity light="type: ambient; color: #444"></a-entity>
	<a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-.5 1 1"></a-entity>	
	  
	<!-- ship position -->
	<a-entity id="meP" position="0 5 100">

		<!-- space background moves with ship -->
		<a-sky src="#sky" material="depthWrite: false; 
			blending: none; dithering: false; fog: false"></a-sky>

		<!-- ship orientation -->
		<a-entity id="meR" pilot>
			<!-- ship frame - lighting, cockpit; ref = floor under pilot -->
			
			<a-entity id="joystick" position="0 0 -0.5">
				<a-cylinder height="0.5" radius="0.02" position="0 0.25 0"
					material="color: #899dcd; metalness: 0.7" 
					geometry="segmentsHeight: 1; segmentsRadial: 8">
				</a-cylinder>
				<a-cylinder height="0.14" radius="0.03" position="0 0.56 0"
					material="color: #202020; metalness: 0.1" 
					geometry="segmentsHeight: 1; segmentsRadial: 16">
				</a-cylinder>
				<a-entity id="jc" joyctl></a-entity>
			</a-entity>
	
			<!-- VR headset/controllers with adjustable offset -->
			<a-entity id="vrpos" position="0 -0.5 0">
			<a-camera> </a-camera>
			<a-entity id="LHand" hand-controls="hand: left; 
				color: #696145; handModelStyle: highPoly; autoHide=false"
				thumb-events></a-entity>
			<a-entity id="RHand" hand-controls="hand: right;
				color: #696145; handModelStyle: highPoly; autoHide=false"
				thumb-events></a-entity>
			</a-entity>
		</a-entity>
	</a-entity>
	
</a-scene>

</body></html>
