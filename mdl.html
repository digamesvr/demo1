<script>
function rgbToHex(r, g, b) {
  const toHex = (c) => Math.floor(c).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
};

function add_asteroid(ix, iy, iz) {
	// parent with rotation axis
	let p = document.createElement('a-entity');
	// scale and jiggle position
	p.object3D.position.x = ix * 40 + Math.random()*2;
	p.object3D.position.y = iy * 40 + Math.random()*2;
	p.object3D.position.z = iz * 40 + Math.random()*2;
	// axis orient
	p.setAttribute("rotation", `${180*Math.random()} ${180*Math.random()} ${180*Math.random()}`);
	
	// sphere
	let s = document.createElement("a-sphere");
	p.appendChild(s);
	s.object3D.scale.x = 4 + 5*Math.random();
	s.object3D.scale.y = 4 + 5*Math.random();
	s.object3D.scale.z = 4 + 5*Math.random();
	s.setAttribute("segments-height", 16);
	s.setAttribute("segments-width", 16);

	let red = 0x80 + 0x70*Math.random();
	s.setAttribute("material", "color", rgbToHex(red, 
			red - 0x10 + 0x20*Math.random(),
			red - 0x10 + 0x20*Math.random()));
	s.setAttribute("material", 
		`metalness: ${0.1 + 0.8*Math.random()}; roughness: ${0.6 + 0.39*Math.random()};`);
	let scale = -0.1 - 2*Math.random();
	let rep = 1.5 + 4*Math.random();
	s.setAttribute("material", `normalMap: #norm; normalScale: ${scale} ${scale}; normalTextureRepeat: ${rep} ${rep}`);
	scale = 0.3 + 2.4*Math.random();
	rep = Math.floor(3+4*Math.random());
	//rep = 3+4*Math.random();
	s.setAttribute("material", `displacementMap: #disp2; displacementScale: ${scale} ${scale}; displacementTextureRepeat: ${rep} ${rep}`);

	if (Math.random() < 0.2) {		// add spin
		let rx = ry = rz = 0;
		if (Math.random() < 0.3) rx = Math.random() < 0.5 ? -360 : 360;
		if (Math.random() < 0.3) ry = Math.random() < 0.5 ? -360 : 360;
		if (Math.random() < 0.3) rz = Math.random() < 0.5 ? -360 : 360;
		s.setAttribute("animation", `property: rotation; to: ${rx} ${ry} ${rz}; easing: linear; dur: ${40000+100000*Math.random()}`);
	}

	return p;
}
		animation="dur: 20000; easing: linear; from: 0 0 0; loop: true; property: rotation; to: 0 360 360"


function asteroidField() {
	el = document.querySelector("#afield");
	var ix, iy, iz;
	for (ix=-5; ix<=5; ix++) {
		for (iy=-5; iy<=5; iy++) {
			for (iz=-5; iz<=5; iz++) {
				// maybe drop this position, more likely farther from center
				if (Math.random() < (ix+iy+iz)/30) {
					el.appendChild(add_asteroid(ix, iy, iz));
				}
			}
		}
	}
}

asteroidField();
</script>
